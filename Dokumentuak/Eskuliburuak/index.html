<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eskuliburuak</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1000px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .back-link {
            color: #3498db;
            text-decoration: none;
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .back-link:hover {
            background: #e0e0e0;
        }
        .pdf-info {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
        }
        .pdf-info a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        .pdf-info a:hover {
            text-decoration: underline;
        }
        embed {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <a href="https://axpirina.github.io/Biozientzietan-Digitalizazioa/" class="back-link">← Itzuli Dashboard-era</a>
    
    <div class="container">
        <h1>Eskuliburua: NodeMCU-a PROGRAMATZEN</h1>
        
        <div class="pdf-info">
            <p>PDF dokumentua ikusteko behean dago. <a href="NodeMCU-a%20PROGRAMATZEN.pdf" target="_blank">Zuzenean deskargatzeko klikatu hemen</a></p>
        </div>
        
        <embed src="NodeMCU-a%20PROGRAMATZEN.pdf" type="application/pdf">
    </div>
</body>
</html>

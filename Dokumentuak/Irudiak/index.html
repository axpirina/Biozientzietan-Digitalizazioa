<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eskema Elektronikoa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .back-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .image-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .image-card:hover {
            transform: scale(1.03);
        }
        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #f5f5f5;
        }
        .image-card h3 {
            padding: 15px;
            text-align: center;
            font-size: 0.9em;
            color: #333;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        .modal-title {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2em;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Eskema Elektronikoa</h1>
        <a href="https://axpirina.github.io/Biozientzietan-Digitalizazioa/" class="back-link">← Itzuli Dashboard-era</a>
        
        <div class="gallery">
            <div class="image-card" onclick="openModal(this)">
                <img src="Dashboard.png" alt="Dashboard">
                <h3>Dashboard</h3>
            </div>
            <div class="image-card" onclick="openModal(this)">
                <img src="Dht11.png" alt="DHT11 Modulua">
                <h3>DHT11 Modulua</h3>
            </div>
            <div class="image-card" onclick="openModal(this)">
                <img src="Nodemcu.png" alt="NodeMCU">
                <h3>NodeMCU</h3>
            </div>
            <div class="image-card" onclick="openModal(this)">
                <img src="Nodemcu Pinout.jpg" alt="NodeMCU Pinout">
                <h3>NodeMCU Pinout</h3>
            </div>
            <div class="image-card" onclick="openModal(this)">
                <img src="Nodemcu-DHT11- Sketch_bb.png" alt="Zirkuituaren Eskema">
                <h3>Zirkuituaren Eskema</h3>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modalImage" src="">
        <div id="modalTitle" class="modal-title"></div>
    </div>

    <script>
        function openModal(card) {
            var img = card.querySelector('img');
            var title = card.querySelector('h3').textContent;
            document.getElementById('modalImage').src = img.src;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('imageModal').classList.add('show');
        }
        function closeModal() {
            document.getElementById('imageModal').classList.remove('show');
        }
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>

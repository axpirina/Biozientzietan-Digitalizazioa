<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irudiak</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .back-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .image-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #f5f5f5;
        }
        .image-card h3 {
            padding: 15px;
            text-align: center;
            font-size: 0.9em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Irudiak</h1>
        <a href="https://axpirina.github.io/Biozientzietan-Digitalizazioa/" class="back-link">← Itzuli Dashboard-era</a>
        
        <div class="gallery">
            <div class="image-card">
                <img src="Dashboard.png" alt="Dashboard">
                <h3>Dashboard</h3>
            </div>
            <div class="image-card">
                <img src="Dht11.png" alt="DHT11 Modulua">
                <h3>DHT11 Modulua</h3>
            </div>
            <div class="image-card">
                <img src="Nodemcu.png" alt="NodeMCU">
                <h3>NodeMCU</h3>
            </div>
            <div class="image-card">
                <img src="Nodemcu Pinout.jpg" alt="NodeMCU Pinout">
                <h3>NodeMCU Pinout</h3>
            </div>
            <div class="image-card">
                <img src="Nodemcu-DHT11- Sketch_bb.png" alt="Zirkuituaren Eskema">
                <h3>Zirkuituaren Eskema</h3>
            </div>
        </div>
    </div>
</body>
</html>

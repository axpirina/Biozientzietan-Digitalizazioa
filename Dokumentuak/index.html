<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egonaldi Bero Indizea - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            background: rgba(0,0,0,0.3);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 1.5em;
        }
        .header-links {
            display: flex;
            gap: 15px;
        }
        .header-links a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            transition: background 0.3s;
        }
        .header-links a:hover {
            background: rgba(255,255,255,0.3);
        }
        .main-nav {
            background: rgba(0,0,0,0.2);
            padding: 10px 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .main-nav a {
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            background: rgba(255,255,255,0.15);
            border-radius: 5px;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        .main-nav a:hover {
            background: rgba(255,255,255,0.25);
        }
        .main-nav a.dashboard {
            background: #3498db;
        }
        .dashboard-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .dashboard-wrapper {
            flex: 1;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .dashboard-bar {
            background: #2c3e50;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .dashboard-bar span {
            font-size: 0.95em;
        }
        .open-btn {
            background: #3498db;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .open-btn:hover {
            background: #2980b9;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
        }
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }
            .main-nav {
                padding: 10px;
                gap: 10px;
            }
            .dashboard-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Egonaldi Bero Indizea - Denbora Errealeko Dashboard</h1>
        <nav class="header-links">
            <a href="https://github.com/axpirina/Biozientzietan-Digitalizazioa" target="_blank">GitHub</a>
        </nav>
    </header>
    
    <nav class="main-nav">
        <a href="#" class="dashboard">Dashboard</a>
        <a href="Dokumentuak/Irudiak/" target="_blank">Irudiak</a>
        <a href="Dokumentuak/datu%20orriak/" target="_blank">Datu Orriak</a>
        <a href="Dokumentuak/Eskuliburuak/" target="_blank">Eskuliburuak</a>
        <a href="Dokumentuak/Fritzing%20elementuak/" target="_blank">Fritzing Elementuak</a>
        <a href="https://github.com/axpirina/Biozientzietan-Digitalizazioa/blob/main/src/main.cpp" target="_blank">main.cpp</a>
        <a href="https://github.com/axpirina/Biozientzietan-Digitalizazioa/blob/main/README.md" target="_blank">README</a>
        <a href="https://github.com/axpirina/Biozientzietan-Digitalizazioa/blob/main/LICENSE" target="_blank">LICENSE</a>
        <a href="https://github.com/axpirina/Biozientzietan-Digitalizazioa/blob/main/platformio.ini" target="_blank">platformio.ini</a>
        <a href="https://github.com/axpirina/Biozientzietan-Digitalizazioa/tree/main/include" target="_blank">include/</a>
        <a href="https://github.com/axpirina/Biozientzietan-Digitalizazioa/blob/main/Dokumentuak/NodeMCU-a%20PROGRAMATZEN.pdf" target="_blank">PDF Dokumentua</a>
    </nav>
    
    <main class="dashboard-container">
        <div class="dashboard-wrapper">
            <div class="dashboard-bar">
                <span>ESP8266 + DHT11 Sensorren Datuak - ThingsBoard</span>
                <a href="https://eu.thingsboard.cloud/dashboard/b4a992a0-398d-11f1-ba44-c54ab1d7f1f4?publicId=ebbac470-3d80-11f1-92f7-cbbd42e0f134" target="_blank" class="open-btn">
                    Ireki ThingsBoard-en
                </a>
            </div>
            <iframe 
                src="https://eu.thingsboard.cloud/dashboard/b4a992a0-398d-11f1-ba44-c54ab1d7f1f4?publicId=ebbac470-3d80-11f1-92f7-cbbd42e0f134"
                title="ThingsBoard Dashboard">
            </iframe>
        </div>
    </main>
</body>
</html>
